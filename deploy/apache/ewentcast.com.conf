# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName ewentcast.com
    ServerAlias www.ewentcast.com

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# HTTPS → Next.js (PM2 on port 3002)
<VirtualHost *:443>
    ServerName ewentcast.com
    ServerAlias www.ewentcast.com

    # Certbot paths (after: sudo certbot --apache -d ewentcast.com -d www.ewentcast.com)
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/ewentcast.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/ewentcast.com/privkey.pem
    Include                 /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3002/ connectiontimeout=5 timeout=300
    ProxyPassReverse / http://127.0.0.1:3002/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "ewentcast.com"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog  ${APACHE_LOG_DIR}/ewentcast-error.log
    CustomLog ${APACHE_LOG_DIR}/ewentcast-access.log combined
</VirtualHost>
